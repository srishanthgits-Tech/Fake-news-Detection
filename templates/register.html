<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-image: url("{{ url_for('static', filename='img.jpg') }}");
            background-size: cover;
            background-position: center;
            color: rgb(15, 15, 15);
            text-align: center;
        }
        .register-container {
            background: rgba(167, 160, 160, 0.8);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
            margin: auto;
            margin-top: 50px;
        }
        h2 {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        .form-label {
            font-weight: 500;
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            transition: 0.3s ease-in-out;
        }
        .form-control:focus {
            border-color: #2575fc;
            box-shadow: 0px 0px 8px rgba(37, 117, 252, 0.3);
        }
        .btn-primary, .btn-secondary {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            border-radius: 8px;
            transition: 0.3s ease-in-out;
            margin-top: 10px;
        }
        .btn-primary:hover, .btn-secondary:hover {
            transform: scale(1.05);
        }
        .login-btn {
            background-color: #007bff;
            color: white;
            text-decoration: none;
            display: block;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
        }
        .login-btn:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>User Registration</h2>
        <form method="POST" action="/register">
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">City</label>
                <input type="text" name="city" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">District</label>
                <input type="text" name="district" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-secondary" onclick="sendOtp()">Send OTP</button>
        </form>

        <!-- Login Button -->
        <a href="/login" class="login-btn">Already have an account? Login</a>
    </div>

    <script>
        function sendOtp() {
            let email = document.querySelector('input[name="email"]').value;
            if (email) {
                window.location.href = '/verify_otp';
            } else {
                alert('Please enter your email before requesting OTP.');
            }
        }
    </script>
</body>
</html>
