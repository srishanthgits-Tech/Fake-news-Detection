<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikipedia Summary</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url("{{ url_for('static', filename='img.jpg') }}");
            background-color: #f5f5f5;
            margin: 20px;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: auto;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        p {
            line-height: 1.6;
            color: #555;
        }

        a {
            text-decoration: none;
            color: #007bff;
        }

        /* Share button */
        .share-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .share-btn:hover {
            background-color: #0056b3;
        }

        /* Share options modal */
        .share-options {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .share-options h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .share-icons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .share-icon {
            font-size: 28px;
            color: white;
            padding: 10px;
            border-radius: 50%;
            text-align: center;
            width: 50px;
            height: 50px;
        }

        .email { background-color: #ea4335; }
        .whatsapp { background-color: #25d366; }
        .twitter { background-color: #1da1f2; }
        .facebook { background-color: #1877f2; }

        .close-btn {
            margin-top: 15px;
            background-color: #dc3545;
            padding: 8px 15px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 5;
        }

        /* Extra buttons */
        .extra-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .search-btn, .logout-btn {
            padding: 10px 20px;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            transition: 0.3s ease;
        }

        .search-btn {
            background-color: #28a745;
        }

        .logout-btn {
            background-color: #dc3545;
        }

        .search-btn:hover {
            background-color: #218838;
        }

        .logout-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Wikipedia Summary</h1>
        <p>{{ summary }}</p>
        <h3>Content Status: {{ status }}</h3>

        <button class="share-btn" onclick="showShareOptions()">🔗 Share this Content</button>

        <a href="{{ url_for('download_article', topic=topic) }}" target="_blank">📥 Download Full Content</a>

        <div class="extra-buttons">
            <a href="{{ url_for('dashboard') }}" class="search-btn">🔍 Search for Another Topic</a>
            <a href="{{ url_for('logout') }}" class="logout-btn">🚪 Logout</a>
        </div>
    </div>

    <!-- Share Options Modal -->
    <div class="share-options" id="shareModal">
        <h3>Share Options</h3>
        <div class="share-icons">
            <a href="#" target="_blank" id="share-email" class="share-icon email">📧</a>
            <a href="#" target="_blank" id="share-whatsapp" class="share-icon whatsapp">📱</a>
            <a href="#" target="_blank" id="share-twitter" class="share-icon twitter">🐦</a>
            <a href="#" target="_blank" id="share-facebook" class="share-icon facebook">📘</a>
        </div>
        <button class="close-btn" onclick="closeShareOptions()">Close</button>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="closeShareOptions()"></div>

    <script>
        function showShareOptions() {
            document.getElementById('shareModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';

            let topic = encodeURIComponent("{{ topic }}");
            let summary = encodeURIComponent(`{{ summary|replace('\n', ' ') }}`);
            let shareUrl = encodeURIComponent(window.location.href);

            document.getElementById("share-email").href = `mailto:?subject=Wikipedia Summary: ${topic}&body=${summary} - ${shareUrl}`;
            document.getElementById("share-whatsapp").href = `https://wa.me/?text=Wikipedia Summary: ${topic} - ${summary} - ${shareUrl}`;
            document.getElementById("share-twitter").href = `https://twitter.com/intent/tweet?text=Wikipedia Summary: ${topic} - ${shareUrl}`;
            document.getElementById("share-facebook").href = `https://www.facebook.com/sharer/sharer.php?u=${shareUrl}`;
        }

        function closeShareOptions() {
            document.getElementById('shareModal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>

</body>

</html>
